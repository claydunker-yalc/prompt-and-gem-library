<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prompt & Gem Library</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%23667eea'><path d='M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5'/></svg>">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Prompt & Gem Library</h1>
            <p class="subtitle">Store and search by meaning</p>
        </header>

        <!-- Search Section -->
        <section class="search-section">
            <form id="search-form">
                <input
                    type="text"
                    id="search-input"
                    placeholder="Search by concept (e.g., 'code review prompts')"
                >
                <button type="submit">Search</button>
            </form>
            <select id="type-filter">
                <option value="">All Types</option>
                <option value="gem">Gems</option>
                <option value="prompt">Prompts</option>
                <option value="framework">Frameworks</option>
            </select>
            <button id="show-all-btn" class="secondary">Show All</button>
        </section>

        <!-- Add Section with Tabs -->
        <section class="add-section">
            <div class="add-tabs">
                <button class="add-tab active" data-type="gem">Add Gem</button>
                <button class="add-tab" data-type="prompt">Add Prompt</button>
                <button class="add-tab" data-type="framework">Add Framework</button>
            </div>

            <!-- Gem Form -->
            <form id="gem-form" class="add-form active">
                <input type="url" id="gem-url" placeholder="Gemini Gem URL" required>
                <input type="text" id="gem-title" placeholder="Title" required>
                <textarea id="gem-description" placeholder="Description (optional)" rows="2"></textarea>
                <button type="submit">Save Gem</button>
            </form>

            <!-- Prompt Form -->
            <form id="prompt-form" class="add-form">
                <input type="text" id="prompt-title" placeholder="Title (optional - will auto-generate)">
                <textarea id="prompt-text" placeholder="Paste the full prompt text here..." rows="6" required></textarea>
                <p class="form-hint">A description will be automatically generated by AI.</p>
                <button type="submit">Save Prompt</button>
            </form>

            <!-- Framework Form -->
            <form id="framework-form" class="add-form">
                <input type="text" id="framework-name" placeholder="Acronym (e.g., RICCE)" required>
                <textarea id="framework-description" placeholder="Description (optional)" rows="2"></textarea>
                <div class="breakdown-section">
                    <label>Letter Breakdown:</label>
                    <div id="breakdown-fields">
                        <div class="breakdown-row">
                            <input type="text" class="letter-input" placeholder="R" maxlength="2">
                            <input type="text" class="meaning-input" placeholder="Role">
                            <button type="button" class="remove-row-btn">-</button>
                        </div>
                    </div>
                    <button type="button" id="add-letter-btn" class="secondary small">+ Add Letter</button>
                </div>
                <button type="submit">Save Framework</button>
            </form>

            <div id="add-status" class="status"></div>
        </section>

        <!-- Results Section -->
        <section class="results-section">
            <h2 id="results-heading">Recent Items</h2>
            <div id="results" class="results-grid"></div>
            <div id="loading" class="loading hidden">Loading...</div>
            <div id="error" class="error hidden"></div>
        </section>
    </div>

    <!-- Edit Modal -->
    <div id="edit-modal" class="modal hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Edit Item</h2>
                <button class="close-btn" id="close-edit-modal">&times;</button>
            </div>
            <form id="edit-form">
                <div class="form-group">
                    <label for="edit-title">Title</label>
                    <input type="text" id="edit-title" placeholder="Title">
                </div>
                <div class="form-group">
                    <label for="edit-description">Description / Notes</label>
                    <textarea id="edit-description" rows="4" placeholder="Add notes or description..."></textarea>
                </div>
                <div class="form-actions">
                    <button type="button" class="secondary" id="cancel-edit">Cancel</button>
                    <button type="submit">Save Changes</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Toast notification -->
    <div id="toast" class="toast hidden"></div>

    <script src="app.js"></script>
</body>
</html>
